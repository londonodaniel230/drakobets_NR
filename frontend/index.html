<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrakoBets RAG System</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <header class="header">
        <img src="./assets/logo.png" alt="DrakoBets Logo" class="logo">
        <h1>🔥 Sistema RAG NoSQL - DrakoBets</h1>
    </header>

    <main class="container">

        <section class="card">
            <h2>🔍 Consulta Inteligente</h2>

            <textarea id="query" placeholder="Escribe tu pregunta aquí..."></textarea>

            <button id="btnConsultar">Consultar</button>

            <h3>📘 Respuesta:</h3>
            <div id="respuesta" class="respuesta"></div>

            <h3>📌 Referencias utilizadas:</h3>
            <div id="referencias" class="referencias"></div>
        </section>

    </main>

    <script src="./js/app.js"></script>
</body>
</html>
